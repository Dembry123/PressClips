<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Press Clips Finder</title>
  <link rel="stylesheet" href="/styles.css?v=4">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <div class="page-shell">
    <main class="app">
      <h1>Press Clips Finder</h1>
      <p class="subtitle">Cross-check Brave and Exa for the selected time range.</p>

      <form
        id="search-form"
        class="search-form"
        hx-post="/search"
        hx-target="#results"
        hx-swap="innerHTML"
        hx-indicator="#loading,#results-loading,#search-button"
        hx-disabled-elt="#search-button"
      >
        <label for="client-name">Client name</label>
        <input id="client-name" name="clientName" type="text" placeholder="e.g. Maura Higgins" required>
        <label for="search-window">Time range</label>
        <select id="search-window" name="searchWindow">
          <option value="1d" selected>Past day</option>
          <option value="3d">Past 3 days</option>
        </select>
        <button id="search-button" type="submit">
          <span class="btn-label">Find press clips</span>
          <span class="btn-progress" aria-hidden="true">...</span>
        </button>
      </form>

      <div class="status">
        <span id="loading" class="loading">Searching...</span>
        <span class="idle">Ready.</span>
      </div>

      <section class="results-wrap">
        <div class="results-header">
          <h2>Results</h2>
          <div class="results-actions">
            <button id="undo-deletions" class="undo-button" type="button" hidden disabled>
              Undo deletions
            </button>
            <button id="copy-results" class="copy-button" type="button" disabled>
              <span class="copy-button-label">Copy</span>
            </button>
          </div>
        </div>
        <div id="results-loading" class="results-loading htmx-indicator">Loading ...</div>
        <div id="results" class="results" role="list" aria-label="Press clips results">
          <p>Run a search to load clips.</p>
        </div>
      </section>
    </main>

    <aside class="diagnostics-modal" aria-labelledby="diagnostics-title">
      <div class="diagnostics-modal-inner">
        <h2 id="diagnostics-title">Provider Diagnostics</h2>
        <div id="diagnostics-body" class="diagnostics-body">
          <p>Run a search to view provider details.</p>
        </div>
      </div>
    </aside>
  </div>
  <script>
    (() => {
      const results = document.getElementById("results");
      const undoButton = document.getElementById("undo-deletions");
      const copyButton = document.getElementById("copy-results");
      const copyLabel = copyButton.querySelector(".copy-button-label");
      const emptyStateMessage = "All clips removed from this list.";
      let deletedRows = [];
      let resetTimer = null;

      function getCopyRoot() {
        return results.querySelector("[data-copy-root]");
      }

      function getClipRows(scope = results) {
        return Array.from(scope.querySelectorAll("[data-clip-row]"));
      }

      function getResultsCount() {
        return getClipRows().length;
      }

      function getCountLabel(count) {
        return `${count} unique result(s)`;
      }

      function getResultsCountNode() {
        return results.querySelector("[data-results-count]");
      }

      function getPreviewShell() {
        return results.querySelector("[data-results-preview]");
      }

      function getEmptyStateNode() {
        return results.querySelector("[data-results-empty]");
      }

      function getResultsRowContainer() {
        const firstTableRow = results.querySelector("[data-copy-root] tr");
        return firstTableRow?.parentNode ?? null;
      }

      function seedClipOrder() {
        getClipRows().forEach((row, index) => {
          row.dataset.clipOrder = String(index);
        });
      }

      function clearDeletedRows() {
        deletedRows = [];
      }

      function refreshUndoButton() {
        const deletedCount = deletedRows.length;
        undoButton.hidden = deletedCount === 0;
        undoButton.disabled = deletedCount === 0;
        undoButton.textContent = deletedCount > 0
          ? `Undo deletions (${deletedCount})`
          : "Undo deletions";
      }

      function setCopyState(state, label) {
        copyButton.dataset.state = state;
        copyLabel.textContent = label;
      }

      function refreshCopyButton({ resetState = false } = {}) {
        const hasCopyableContent = Boolean(getCopyRoot()) && getResultsCount() > 0;
        copyButton.disabled = !hasCopyableContent;
        if (!hasCopyableContent || resetState) {
          clearTimeout(resetTimer);
          setCopyState("idle", "Copy");
        } else if (copyButton.dataset.state !== "copied") {
          setCopyState("idle", "Copy");
        }
      }

      function syncResultsState({ resetCopyState = false } = {}) {
        const resultCount = getResultsCount();
        const countNode = getResultsCountNode();
        const previewShell = getPreviewShell();
        let emptyStateNode = getEmptyStateNode();

        if (countNode) {
          countNode.textContent = getCountLabel(resultCount);
        }

        if (previewShell) {
          previewShell.hidden = resultCount === 0;

          if (resultCount === 0) {
            if (!emptyStateNode) {
              emptyStateNode = document.createElement("p");
              emptyStateNode.className = "empty-state";
              emptyStateNode.dataset.resultsEmpty = "true";
              emptyStateNode.textContent = emptyStateMessage;
              previewShell.insertAdjacentElement("afterend", emptyStateNode);
            }
          } else if (emptyStateNode) {
            emptyStateNode.remove();
          }
        } else if (emptyStateNode) {
          emptyStateNode.remove();
        }

        refreshUndoButton();
        refreshCopyButton({ resetState: resetCopyState });
      }

      function restoreDeletedRows() {
        if (deletedRows.length === 0) {
          return;
        }

        const rowContainer = getResultsRowContainer();
        if (!rowContainer) {
          clearDeletedRows();
          syncResultsState({ resetCopyState: true });
          return;
        }

        deletedRows
          .sort((a, b) => a.order - b.order)
          .forEach(({ row, order }) => {
            const insertBeforeRow = getClipRows(rowContainer)
              .find((existingRow) => Number(existingRow.dataset.clipOrder) > order);

            if (insertBeforeRow) {
              rowContainer.insertBefore(row, insertBeforeRow);
            } else {
              rowContainer.appendChild(row);
            }
          });

        clearDeletedRows();
        syncResultsState({ resetCopyState: true });
      }

      function normalizeClipboardText(text) {
        return text
          .replace(/\r\n/g, "\n")
          .replace(/[ \t]+\n/g, "\n")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function buildClipRowText(row) {
        const card = row.querySelector(".clip-row-card");
        if (!card) {
          return row.innerText.trim();
        }

        return Array.from(card.children)
          .filter((child) => child.tagName !== "BUTTON")
          .map((child) => child.innerText.trim())
          .filter(Boolean)
          .join("\n");
      }

      function createClipboardSnapshot() {
        const copyRoot = getCopyRoot();
        if (!copyRoot || getResultsCount() === 0) {
          return null;
        }

        const snapshotRoot = copyRoot.cloneNode(true);
        snapshotRoot.querySelectorAll("[data-copy-strip]").forEach((node) => {
          node.remove();
        });

        const plainText = normalizeClipboardText(
          Array.from(snapshotRoot.querySelectorAll("tr"))
            .map((row) => row.matches("[data-clip-row]") ? buildClipRowText(row) : row.innerText.trim())
            .filter(Boolean)
            .join("\n\n")
        );

        return {
          plainText
        };
      }

      async function copyResults() {
        const snapshot = createClipboardSnapshot();
        if (!snapshot) {
          return;
        }

        const { plainText } = snapshot;

        try {
          if (navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(plainText);
          } else if (window.ClipboardItem && navigator.clipboard?.write) {
            const clipboardItem = new ClipboardItem({
              "text/plain": new Blob([plainText], { type: "text/plain" })
            });
            await navigator.clipboard.write([clipboardItem]);
          } else {
            const textarea = document.createElement("textarea");
            textarea.value = plainText;
            textarea.setAttribute("readonly", "");
            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";
            textarea.style.top = "0";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            document.execCommand("copy");
            textarea.remove();
          }

          setCopyState("copied", "Copied");
          clearTimeout(resetTimer);
          resetTimer = window.setTimeout(() => {
            setCopyState("idle", "Copy");
          }, 1800);
        } catch (error) {
          console.error("Unable to copy results", error);
          setCopyState("error", "Try Cmd+C");
          clearTimeout(resetTimer);
          resetTimer = window.setTimeout(() => {
            setCopyState("idle", "Copy");
          }, 2400);
        }
      }

      copyButton.addEventListener("click", copyResults);
      undoButton.addEventListener("click", restoreDeletedRows);
      results.addEventListener("click", (event) => {
        const deleteButton = event.target.closest("[data-delete-clip]");
        if (!deleteButton || !results.contains(deleteButton)) {
          return;
        }

        const clipRow = deleteButton.closest("[data-clip-row]");
        if (!clipRow) {
          return;
        }

        const clipOrder = Number(clipRow.dataset.clipOrder);
        deletedRows.push({
          row: clipRow,
          order: Number.isFinite(clipOrder) ? clipOrder : getClipRows().indexOf(clipRow)
        });
        clipRow.remove();
        syncResultsState({ resetCopyState: true });
      });

      document.body.addEventListener("htmx:afterSwap", (event) => {
        if (event.target.id === "results") {
          clearDeletedRows();
          seedClipOrder();
          syncResultsState({ resetCopyState: true });
        }
      });

      seedClipOrder();
      syncResultsState({ resetCopyState: true });
    })();
  </script>
</body>
</html>
